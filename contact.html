<form class="contact-form"
      action="mailto:info@lcafe-esports.co.za"
      method="post"
      enctype="text/plain">
  <div class="field"><label for="name">Name</label>
    <input id="name" name="Name" type="text" required maxlength="100" /></div>
  <div class="field"><label for="surname">Surname</label>
    <input id="surname" name="Surname" type="text" required maxlength="100" /></div>
  <div class="field"><label for="email">Email Address</label>
    <input id="email" name="Email" type="email" required maxlength="255" /></div>
  <div class="field"><label for="school">Name of School</label>
    <input id="school" name="School" type="text" required maxlength="150" /></div>
  <div class="field"><label for="contact">Contact Number / Email</label>
    <input id="contact" name="Contact" type="text" required maxlength="100" /></div>
  <button type="submit" class="btn-submit">Send Message</button>
</form>
