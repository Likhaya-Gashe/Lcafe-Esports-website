<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rules — Lcafe Esports</title>
  <meta name="description" content="Official tournament and conduct rules for Lcafe Esports." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="nav">
     <a href="#top" class="logo">
    <img src="images/Logo.png" alt="LCAFE Logo" class="nav-logo">
  </header>
  
<form class="contact-form"
      action="mailto:info@lcafe-esports.co.za"
      method="post"
      enctype="text/plain">
  <div class="field"><label for="name">Name</label>
    <input id="name" name="Name" type="text" required maxlength="100" /></div>
  <div class="field"><label for="surname">Surname</label>
    <input id="surname" name="Surname" type="text" required maxlength="100" /></div>
  <div class="field"><label for="email">Email Address</label>
    <input id="email" name="Email" type="email" required maxlength="255" /></div>
  <div class="field"><label for="school">Name of School</label>
    <input id="school" name="School" type="text" required maxlength="150" /></div>
  <div class="field"><label for="contact">Contact Number / Email</label>
    <input id="contact" name="Contact" type="text" required maxlength="100" /></div>
  <button type="submit" class="btn-submit">Send Message</button>
</form>

<div class="container" style="margin-top:2rem; text-align:center">
    <a href="index.html" class="btn btn-outline" style="padding:0.5rem 1rem;font-size:0.8rem">Back Home</a>
  </div>
  <footer class="footer">
    <div class="container footer-row">
      <div class="logo"><span class="logo-bolt"></span><span class="logo-text"></span></div>
      <p class="muted">© 2026 Lcafe Esports. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
